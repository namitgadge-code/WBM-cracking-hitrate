<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>WBM Writer Hit Rate — May–Jun 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:#f5f5f3;color:#1a1a1a;font-size:13px}
:root{--bdr:#e5e5e2;--txt2:#555;--txt3:#888;--surf:#fff;--acc:#4f46e5}

/* NAV */
.nav{height:48px;background:#fff;border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 24px;position:sticky;top:0;z-index:100}
.nav-title{font-size:14px;font-weight:700;color:#111;letter-spacing:-.3px}
.seg{display:flex;margin-left:auto;background:#f0f0ee;border-radius:8px;padding:3px;gap:2px}
.seg-btn{padding:6px 16px;border:none;background:none;border-radius:6px;font-size:12px;font-weight:500;color:var(--txt2);cursor:pointer;font-family:inherit;transition:all .12s;white-space:nowrap}
.seg-btn.active{background:var(--acc);color:#fff;box-shadow:0 1px 4px rgba(0,0,0,.15);font-weight:600}

/* SCRIPT TABS */
.script-tabs{display:flex;background:#fff;border-bottom:1px solid var(--bdr);padding:0 24px}
.stab{padding:10px 18px;border:none;background:none;font-size:12px;font-weight:500;color:var(--txt3);cursor:pointer;font-family:inherit;border-bottom:2px solid transparent;transition:all .12s}
.stab.active{color:var(--acc);border-bottom-color:var(--acc);font-weight:600}

/* MONTH GROUP */
.month-group{padding:20px 24px 4px}
.month-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--txt3);margin-bottom:12px}
.cards-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}

/* SUMMARY CARD — matches reference exactly */
.s-card{background:#fff;border:1px solid var(--bdr);border-radius:10px;padding:12px 14px;flex:1;min-width:0}
.s-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.s-writer{font-size:10px;font-weight:700;color:#111;letter-spacing:.3px}
.s-month-pill{font-size:8px;font-weight:600;padding:2px 7px;border-radius:20px;background:#eff6ff;color:var(--acc)}
.s-metrics{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.s-hitrate{min-width:52px}
.s-hr-val{font-size:20px;font-weight:800;line-height:1}
.s-hr-lbl{font-size:8px;font-weight:500;text-transform:uppercase;letter-spacing:.4px;color:var(--txt3);margin-top:2px}
.s-total-block{display:flex;flex-direction:column;align-items:center}
.s-total-n{font-size:16px;font-weight:700;color:#111}
.s-total-lbl{font-size:8px;color:var(--txt3);text-transform:uppercase;letter-spacing:.3px}
.s-divider{width:1px;height:30px;background:var(--bdr)}
.s-buckets{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;width:100%}
.s-bkt{display:flex;flex-direction:column;align-items:center;padding:4px 2px;border-radius:6px}
.s-bkt-n{font-size:14px;font-weight:700;line-height:1}
.s-bkt-lbl{font-size:7px;color:var(--txt3);margin-top:2px;white-space:nowrap;text-align:center}

/* CPI bucket colours */
.c-u3{color:#14532d} .c-u35{color:#16a34a} .c-u4{color:#16a34a} .c-u5{color:#ca8a04} .c-ov5{color:#dc2626}
.c-miss{color:#e5e7eb}
/* CTR colours (reversed) */
.ct-l40{color:#dc2626} .ct-40{color:#ca8a04} .ct-50{color:#16a34a} .ct-60{color:#16a34a} .ct-65{color:#14532d}

/* DETAIL TABLE */
.detail{padding:0 24px 32px;margin-top:8px}
.detail-title{font-size:12px;font-weight:600;color:#111;margin-bottom:4px}
.detail-sub{font-size:10px;color:var(--txt3);margin-bottom:12px}
.tbl-wrap{overflow-x:auto;border:1px solid var(--bdr);border-radius:10px;background:#fff}
table{width:100%;border-collapse:collapse;min-width:800px}
thead th{background:#f7f6f3;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--txt3);padding:8px 12px;border-bottom:2px solid var(--bdr);text-align:right;white-space:nowrap;border-right:1px solid rgba(0,0,0,0.05)}
thead th.thl{text-align:left}
thead th.thc{text-align:center}
tbody td{padding:7px 12px;font-size:11px;text-align:right;border-bottom:1px solid #f0f0ee;border-right:1px solid rgba(0,0,0,0.04)}
tbody td.tdw{text-align:left;font-weight:700;font-size:11px;color:#111;background:#fafaf8;white-space:nowrap;padding-left:14px}
tbody td.tdwk{text-align:left;color:var(--txt3);font-size:10px;padding-left:24px;background:#fefefe}
tbody td.tdn{font-weight:600;color:#111;text-align:center}
tbody tr:last-child td{border-bottom:none}

/* heat cells */
.h0{background:#4ade80} .h1{background:#86efac} .h2{background:#d1fae5} .h3{background:#fef9c3} .h4{background:#ffedd5}
.h0c{background:#f0fdf4} .h1c{background:#dcfce7} .h2c{background:#fefce8} .h3c{background:#fff7ed} .h4c{background:#fef2f2}
.hc-l40{background:#ffedd5} .hc-40{background:#fef9c3} .hc-50{background:#d1fae5} .hc-60{background:#86efac} .hc-65{background:#4ade80}
.hit-col{font-weight:700;text-align:right}
.hit-pos{color:#14532d} .hit-zero{color:#9ca3af} .hit-neg{color:#dc2626}
.empty-cell{color:#e5e7eb;text-align:center}
</style>
</head>

const CPI_LABELS = ['<$3','$3–$3.5','$3.5–$4','$4–$5','>$5'];
const CTR_LABELS = ['<0.40%','0.40–0.50%','0.50–0.60%','0.60–0.65%','0.65%+'];
const CPI_HR_CLS = ['c-u3','c-u35','c-u4','c-u5','c-ov5'];
const CTR_HR_CLS = ['ct-l40','ct-40','ct-50','ct-60','ct-65'];
const CPI_HEAT  = ['h0','h1','h2','h3','h4'];
const CTR_HEAT  = ['hc-l40','hc-40','hc-50','hc-60','hc-65'];

let _mode='cpi', _script='v7';

function setMode(m,btn){
  _mode=m;
  document.querySelectorAll('.seg-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}
function setScript(s,btn){
  _script=s;
  document.querySelectorAll('.stab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function hrColor(pct){
  if(pct>=15)return '#14532d';
  if(pct>=10)return '#16a34a';
  if(pct>=5) return '#ca8a04';
  if(pct>0)  return '#ea580c';
  return '#9ca3af';
}

function renderCard(w,monthData,monthName,isCpi){
  const d=monthData;
  if(d.total===0) return '';
  const bkts = isCpi?d.cpi_bkt:d.ctr_bkt;
  const hr   = isCpi?d.cpi_hit_rate:d.ctr_hit_rate;
  const labels= isCpi?CPI_LABELS:CTR_LABELS;
  const cls   = isCpi?CPI_HR_CLS:CTR_HR_CLS;
  const col   = hrColor(hr);

  const BKT_BG_CPI=['#4ade80','#86efac','#d1fae5','#fef9c3','#ffedd5'];
  const BKT_BG_CTR=['#ffedd5','#fef9c3','#d1fae5','#86efac','#4ade80'];
  const bgtbl = isCpi ? BKT_BG_CPI : BKT_BG_CTR;
  const bktHtml = bkts.map((v,i)=>`
    <div class="s-bkt" style="background:${v>0?bgtbl[i]:'transparent'}">
      <span class="s-bkt-n ${v>0?cls[i]:'c-miss'}">${v||0}</span>
      <span class="s-bkt-lbl">${labels[i]}</span>
    </div>`).join('');

  return `<div class="s-card">
    <div class="s-card-header">
      <span class="s-writer">${w.toUpperCase()}</span>
      <span class="s-month-pill">${monthName}</span>
    </div>
    <div class="s-metrics">
      <div class="s-hitrate">
        <div class="s-hr-val" style="color:${col}">${hr}%</div>
        <div class="s-hr-lbl">Hit Rate</div>
      </div>
      <div class="s-divider"></div>
      <div class="s-total-block">
        <div class="s-total-n">${d.total}</div>
        <div class="s-total-lbl">Total</div>
      </div>
    </div>
    <div class="s-buckets">${bktHtml}</div>
  </div>`;
}

function render(){
  const sd=DATA[_script];
  const isCpi=_mode==='cpi';
  const labels=isCpi?CPI_LABELS:CTR_LABELS;
  const heat=isCpi?CPI_HEAT:CTR_HEAT;
  const writers=sd.writer_order;
  const weeks=sd.weeks;

  // Summary: May row + Jun row, split into 2 sub-rows per month
  const hasLuna=_script==='luna';
  const ROW1 = hasLuna ? ['Arzoo','Shainee','Zeenat'] : ['Eeshita','Shainee','Zeenat'];
  const ROW2 = hasLuna ? [] : ['Arzoo','Trishani'];
  let sumHtml='';

  function monthRows(month, label) {
    const r1 = ROW1.map(w=>sd.writers[w]?renderCard(w,sd.writers[w][month],label,isCpi):'').filter(Boolean);
    const r2 = ROW2.map(w=>sd.writers[w]?renderCard(w,sd.writers[w][month],label,isCpi):'').filter(Boolean);
    const allCards = [...r1, ...r2];
    if(!allCards.length) return '';
    let h = `<div class="month-group"><div class="month-label">${label==='May'?'May 2026':'Jun 2026'}</div>`;
    // Only split into 2 rows when 4+ writers are active
    if(allCards.length >= 4 && r2.length) {
      if(r1.length) h += `<div class="cards-row">${r1.join('')}</div>`;
      if(r2.length) h += `<div class="cards-row" style="margin-top:10px">${r2.join('')}</div>`;
    } else {
      h += `<div class="cards-row">${allCards.join('')}</div>`;
    }
    h += `</div>`;
    return h;
  }

  if(!hasLuna) sumHtml += monthRows('may','May');
  sumHtml += monthRows('jun','Jun');

  document.getElementById('summary-section').innerHTML=sumHtml;

  // Detail title
  document.getElementById('detail-title').textContent=
    (isCpi?'CPI':'CTR×CTI')+' Distribution — Writer × Week';
  document.getElementById('detail-sub').textContent=
    isCpi?'Hit = ≤$3.5 CPI':'Hit = ≥0.50% CTR×CTI';

  // Table
  const bktSpan=labels.length;
  document.getElementById('thead').innerHTML=`<tr>
    <th class="thl" style="min-width:90px">Writer</th>
    <th class="thl" style="min-width:80px">Week</th>
    <th class="thc" style="min-width:40px">N</th>
    ${labels.map(l=>`<th>${l}</th>`).join('')}
    <th class="hit-col">Hit</th>
  </tr>`;

  function bktCells(bkts,n,isCpi){
    return bkts.map((v,i)=>{
      if(!n) return '<td class="empty-cell">&ndash;</td>';
      const pct=n>0?Math.round(v/n*100):0;
      const hcls=heat[i];
      if(v===0) return `<td style="color:#e5e7eb;text-align:center">&ndash;</td>`;
      return `<td class="${hcls}" style="text-align:center">${v}<span style="font-size:9px;color:var(--txt3);margin-left:2px">${pct}%</span></td>`;
    }).join('');
  }

  let rows='';
  writers.forEach(w=>{
    const wd=sd.writers[w];
    let firstRow=true;
    weeks.forEach(wk=>{
      const wkd=wd.by_week[wk];
      if(!wkd||wkd.total===0) return;
      const bkts=isCpi?wkd.cpi_bkt:wkd.ctr_bkt;
      const n=isCpi?wkd.cpi_n:wkd.ctr_n;
      const hit=isCpi?wkd.cpi_hit:wkd.ctr_hit;
      const hitPct=n>0?Math.round(hit/n*100):0;
      const hitCls=hit>0?(hitPct>=15?'hit-pos':hitPct>=5?'':'hit-neg'):'hit-zero';
      const writerCell=firstRow?`<td class="tdw" rowspan="${weeks.filter(wk2=>{const d=wd.by_week[wk2];return d&&d.total>0}).length}">${w}</td>`:'';
      firstRow=false;
      rows+=`<tr>
        ${writerCell}
        <td class="tdwk">${wk}</td>
        <td class="tdn">${wkd.total}</td>
        ${bktCells(bkts,n,isCpi)}
        <td class="hit-col ${hitCls}">${hit} <span style="font-size:9px">(${hitPct}%)</span></td>
      </tr>`;
    });
  });
  document.getElementById('tbody').innerHTML=rows;
}

render();
</script>
</body>
</html>
