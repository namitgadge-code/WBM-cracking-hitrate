<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>WBM Writer Hit Rate — May–Jun 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f4f5f7;--surf:#fff;--surf2:#f8f9fb;--bdr:#e4e7ec;--txt:#101828;--txt2:#475467;--txt3:#98a2b3;--acc:#4f46e5}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt);font-size:13px}
.nav{background:var(--surf);border-bottom:1px solid var(--bdr);padding:0 24px;height:52px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.brand{font-size:14px;font-weight:600}.brand span{color:var(--acc)}
.toggle{margin-left:auto;display:flex;background:var(--bg);border:1px solid var(--bdr);border-radius:6px;overflow:hidden}
.t-btn{padding:5px 16px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:transparent;font-family:'Inter',sans-serif;color:var(--txt2)}
.t-btn.on{background:var(--acc);color:#fff}
.wrap{padding:20px 24px}

/* SUMMARY SECTION */
.sum-section{margin-bottom:20px}
.sum-section-label{font-size:10px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px;padding-left:2px}
.summary-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:8px}
.sum-bar{background:var(--surf);border:1px solid var(--bdr);border-radius:10px;overflow:hidden}
.sum-bar-hdr{display:flex;align-items:center;justify-content:space-between;padding:9px 14px 7px;border-bottom:1px solid var(--bdr)}
.sum-bar-name{font-size:11px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px}
.sum-bar-mo{font-size:10px;font-weight:600;color:var(--acc);background:var(--surf2);padding:2px 8px;border-radius:20px;border:1px solid var(--bdr)}
.sum-pills{display:flex;gap:6px;padding:9px 12px;flex-wrap:nowrap;overflow-x:auto}
.sum-pills::-webkit-scrollbar{height:0}
.pill{display:flex;flex-direction:column;align-items:center;padding:7px 10px;border-radius:7px;flex:1;min-width:48px}
.pill .pv{font-size:18px;font-weight:700;font-family:'JetBrains Mono',monospace;line-height:1.1;white-space:nowrap}
.pill .pl{font-size:8px;font-weight:500;text-transform:uppercase;letter-spacing:.3px;margin-top:3px;opacity:.75;white-space:nowrap}
.ph-red  {background:#fef2f2;color:#dc2626}
.ph-amb  {background:#fffbeb;color:#d97706}
.ph-grn  {background:#ecfdf5;color:#059669}
.p-total {background:var(--surf2);color:var(--txt)}
.p-g1    {background:#ecfdf5;color:#059669}
.p-g2    {background:#d1fae5;color:#065f46}
.p-amb   {background:#fffbeb;color:#78350f}
.p-org   {background:#fff7ed;color:#7c2d12}
.p-red   {background:#fef2f2;color:#7f1d1d}
.p-clo   {background:#fef2f2;color:#7f1d1d}
.p-cmid  {background:#fff7ed;color:#7c2d12}
.p-cgood {background:#ecfdf5;color:#059669}
.p-cstr  {background:#bbf7d0;color:#14532d}
.p-chi   {background:#059669;color:#fff}

/* TABLE */
.tbl-wrap{background:var(--surf);border:1px solid var(--bdr);border-radius:10px;overflow:hidden;margin-bottom:16px}
.tbl-hdr{padding:12px 16px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:10px}
.tbl-hdr strong{font-size:12px;font-weight:600}
.tbl-hdr span{font-size:11px;color:var(--txt3)}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{background:var(--surf2);font-size:9px;font-weight:500;color:var(--txt3);text-transform:uppercase;letter-spacing:.4px;padding:7px 10px;border-bottom:1px solid var(--bdr);white-space:nowrap;text-align:center}
thead th.lft{text-align:left}
tbody tr{border-bottom:1px solid var(--bdr)}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#fafafa}
tbody td{padding:7px 10px;text-align:center;white-space:nowrap;font-family:'JetBrains Mono',monospace;font-size:11px}
td.writer{text-align:left;font-family:'Inter',sans-serif;font-weight:600;font-size:12px;background:var(--surf2);border-right:1px solid var(--bdr);vertical-align:middle}
td.week{text-align:left;font-family:'Inter',sans-serif;font-size:11px;color:var(--txt2)}
td.tot{color:var(--txt2);font-weight:500}
td.hit-cell{font-weight:600}
.n{font-size:12px;font-weight:600}
.p{font-size:10px;font-weight:400;margin-left:2px;opacity:.8}
.b1{background:#ecfdf5;color:#065f46}
.b2{background:#d1fae5;color:#065f46}
.b3{background:#fffbeb;color:#78350f}
.b4{background:#fff7ed;color:#7c2d12}
.b5{background:#fef2f2;color:#7f1d1d}
.c0{background:#fef2f2;color:#7f1d1d}
.c1{background:#fff7ed;color:#7c2d12}
.c2{background:#ecfdf5;color:#065f46}
.c3{background:#bbf7d0;color:#14532d}
.c4{background:#059669;color:#fff}
.z{color:var(--txt3);background:transparent;font-weight:400}
.divrow td{background:var(--bg);height:5px;padding:0;border:none}
.leg-bar{display:flex;gap:14px;flex-wrap:wrap;padding:9px 14px;border-top:1px solid var(--bdr);background:var(--surf2)}
.leg-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--txt2)}
.leg-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.partial{font-size:9px;color:var(--txt3)}
</style>
</head>
<body>
<div class="nav">
  <div class="brand">WBM <span>/</span> Writer Hit Rate — May–Jun 2026</div>
  <div class="toggle">
    <button class="t-btn on" id="b-cpi" onclick="show('cpi')">CPI Buckets</button>
    <button class="t-btn" id="b-ctr" onclick="show('ctr')">CTR×CTI Buckets</button>
  </div>

<div class="wrap">

  <div id="sum-ctr" class="sum-section" style="display:none"></div>

<script>

 6, "0.40\u20130.50%": 2, "0.50\u20130.60%": 1, "0.60\u20130.65%": 0, "0.65%+": 0}}, "Jun Wk1": {"total": 12, "cpi": {"<$3": 0, "$3\u20133.5": 0, "$3.5\u20134": 2, "$4\u20135": 0, ">$5": 10}, "ctr": {"<0.40%": 8, "0.40\u20130.50%": 4, "0.50\u20130.60%": 0, "0.60\u20130.65%": 0, "0.65%+": 0}}, "Jun Wk2": {"total": 10, "cpi": {"<$3": 0, "$3\u20133.5": 0, "$3.5\u20134": 1, "$4\u20135": 2, ">$5": 7}, "ctr": {"<0.40%": 2, "0.40\u20130.50%": 5, "0.50\u20130.60%": 3, "0.60\u20130.65%": 0, "0.65%+": 0}}, "Jun Wk3": {"total": 2, "cpi": {"<$3": 0, "$3\u20133.5": 1, "$3.5\u20134": 0, "$4\u20135": 1, ">$5": 0}, "ctr": {"<0.40%": 0, "0.40\u20130.50%": 0, "0.50\u20130.60%": 1, "0.60\u20130.65%": 1, "0.65%+": 0}}}}};
const S={"Eeshita": {"May": {"total": 35, "cpi": {"<$3": 1, "$3\u20133.5": 4, "$3.5\u20134": 4, "$4\u20135": 11, ">$5": 15, "hit_n": 5, "hit_pct": 14.3}, "ctr": {"<0.40%": 17, "0.40\u20130.50%": 10, "0.50\u20130.60%": 8, "0.60\u20130.65%": 0, "0.65%+": 0, "hit_n": 8, "hit_pct": 22.9}}, "Jun": {"total": 16, "cpi": {"<$3": 0, "$3\u20133.5": 1, "$3.5\u20134": 1, "$4\u20135": 3, ">$5": 11, "hit_n": 1, "hit_pct": 6.2}, "ctr": {"<0.40%": 7, "0.40\u20130.50%": 5, "0.50\u20130.60%": 2, "0.60\u20130.65%": 1, "0.65%+": 1, "hit_n": 4, "hit_pct": 25.0}}}, "Trishani": {"May": {"total": 32, "cpi": {"<$3": 0, "$3\u20133.5": 2, "$3.5\u20134": 3, "$4\u20135": 5, ">$5": 22, "hit_n": 2, "hit_pct": 6.2}, "ctr": {"<0.40%": 19, "0.40\u20130.50%": 10, "0.50\u20130.60%": 3, "0.60\u20130.65%": 0, "0.65%+": 0, "hit_n": 3, "hit_pct": 9.4}}, "Jun": {"total": 16, "cpi": {"<$3": 0, "$3\u20133.5": 0, "$3.5\u20134": 0, "$4\u20135": 3, ">$5": 13, "hit_n": 0, "hit_pct": 0.0}, "ctr": {"<0.40%": 7, "0.40\u20130.50%": 7, "0.50\u20130.60%": 2, "0.60\u20130.65%": 0, "0.65%+": 0, "hit_n": 2, "hit_pct": 12.5}}}, "Arzoo": {"May": {"total": 41, "cpi": {"<$3": 3, "$3\u20133.5": 3, "$3.5\u20134": 3, "$4\u20135": 11, ">$5": 21, "hit_n": 6, "hit_pct": 14.6}, "ctr": {"<0.40%": 23, "0.40\u20130.50%": 12, "0.50\u20130.60%": 6, "0.60\u20130.65%": 0, "0.65%+": 0, "hit_n": 6, "hit_pct": 14.6}}, "Jun": {"total": 24, "cpi": {"<$3": 0, "$3\u20133.5": 1, "$3.5\u20134": 3, "$4\u20135": 3, ">$5": 17, "hit_n": 1, "hit_pct": 4.2}, "ctr": {"<0.40%": 10, "0.40\u20130.50%": 9, "0.50\u20130.60%": 4, "0.60\u20130.65%": 1, "0.65%+": 0, "hit_n": 5, "hit_pct": 20.8}}}};

const CPI_DEFS=[
  {key:'<$3',    cls:'b1',col:'#059669',lbl:'<$3',      desc:'Cracked'},
  {key:'$3–3.5', cls:'b2',col:'#34d399',lbl:'$3–$3.5',  desc:'Near crack'},
  {key:'$3.5–4', cls:'b3',col:'#fbbf24',lbl:'$3.5–$4',  desc:'Good'},
  {key:'$4–5',   cls:'b4',col:'#f97316',lbl:'$4–$5',    desc:'Moderate'},

const CTR_DEFS=[

];

function hitCls(pct){ return pct>=20?'ph-grn':pct>=10?'ph-amb':'ph-red'; }

function buildSummaries(mode) {
  const mk = mode==='cpi'?'cpi':'ctr';
  const months = ['May','Jun'];
  const writers = D.writers;
  let html = '';

  months.forEach(mo => {
    html += `<div class="sum-section-label">${mo} 2026</div><div class="summary-row">`;
    writers.forEach(w => {
      const s = S[w][mo];
      const hp = s[mk].hit_pct;
      let pills = `<div class="pill ${hitCls(hp)}"><span class="pv">${hp}%</span><span class="pl">Hit Rate</span></div>`;
      pills += `<div class="pill p-total"><span class="pv">${s.total}</span><span class="pl">Total</span></div>`;
      if(mode==='cpi'){
        pills += `<div class="pill p-g1"><span class="pv">${s.cpi['<$3']}</span><span class="pl">&lt;$3</span></div>`;
        pills += `<div class="pill p-g2"><span class="pv">${s.cpi['$3–3.5']}</span><span class="pl">$3–$3.5</span></div>`;
        pills += `<div class="pill p-amb"><span class="pv">${s.cpi['$3.5–4']}</span><span class="pl">$3.5–$4</span></div>`;
        pills += `<div class="pill p-org"><span class="pv">${s.cpi['$4–5']}</span><span class="pl">$4–$5</span></div>`;
        pills += `<div class="pill p-red"><span class="pv">${s.cpi['>$5']}</span><span class="pl">&gt;$5</span></div>`;
      } else {
        pills += `<div class="pill p-clo"><span class="pv">${s.ctr['<0.40%']}</span><span class="pl">&lt;0.40%</span></div>`;
        pills += `<div class="pill p-cmid"><span class="pv">${s.ctr['0.40–0.50%']}</span><span class="pl">0.40–0.50%</span></div>`;
        pills += `<div class="pill p-cgood"><span class="pv">${s.ctr['0.50–0.60%']}</span><span class="pl">0.50–0.60%</span></div>`;
        pills += `<div class="pill p-cstr"><span class="pv">${s.ctr['0.60–0.65%']}</span><span class="pl">0.60–0.65%</span></div>`;
        pills += `<div class="pill p-chi"><span class="pv">${s.ctr['0.65%+']}</span><span class="pl">0.65%+</span></div>`;
      }
      html += `<div class="sum-bar">
        <div class="sum-bar-hdr"><span class="sum-bar-name">${w}</span><span class="sum-bar-mo">${mo}</span></div>
        <div class="sum-pills">${pills}</div>
      </div>`;
    });
    html += `</div>`;
  });
  return html;
}

function cell(n,total,cls){
  if(!total||n===0) return `<td class="z">—</td>`;
  const p=Math.round(n/total*100);
  return `<td class="${cls}"><span class="n">${n}</span><span class="p">${p}%</span></td>`;
}

function buildTable(mode){
  const defs=mode==='cpi'?CPI_DEFS:CTR_DEFS;
  const mk=mode==='cpi'?'cpi':'ctr';
  const goodKeys=mode==='cpi'?['<$3','$3–3.5']:['0.50–0.60%','0.60–0.65%','0.65%+'];
  const title=mode==='cpi'?'CPI Distribution — Writer × Week':'CTR×CTI Distribution — Writer × Week';
  const note=mode==='cpi'?'Hit = ≤$3.5 CPI':'Hit = ≥0.50% CTR×CTI';

  let th=`<thead><tr><th class="lft" style="width:80px">Writer</th><th class="lft" style="width:68px">Week</th><th style="width:40px">n</th>`;
  defs.forEach(d=>{th+=`<th style="min-width:82px">${d.lbl}</th>`;});
  th+=`<th style="min-width:72px">Hit</th></tr></thead>`;

  let body='<tbody>';
  D.writers.forEach((w,wi)=>{
    if(wi>0) body+=`<tr class="divrow"><td colspan="99"></td></tr>`;
    D.weeks.forEach((wk,wki)=>{
      const d=D.data[w][wk],total=d?.total||0;
      const partial=wk==='Jun Wk3';
      const good=d?goodKeys.reduce((s,k)=>s+(d[mk][k]||0),0):0;
      const hp=total?Math.round(good/total*100):0;
      const hcol=hp>=30?'#059669':hp>=15?'#d97706':'#dc2626';
      body+=`<tr>`;
      if(wki===0) body+=`<td class="writer" rowspan="${D.weeks.length}">${w}</td>`;
      body+=`<td class="week">${wk}${partial?' <span class="partial">*</span>':''}</td>`;
      body+=`<td class="tot">${total||'—'}</td>`;
      if(!total){defs.forEach(()=>{body+=`<td class="z">—</td>`;});body+=`<td class="z">—</td>`;}
      else{
        defs.forEach(def=>{body+=cell(d[mk][def.key]||0,total,def.cls);});
        body+=`<td class="hit-cell" style="color:${hcol}">${good} <span style="font-size:10px;font-weight:400">(${hp}%)</span></td>`;
      }
      body+=`</tr>`;
    });
  });
  body+='</tbody>';

  const legs=defs.map(d=>`<div class="leg-item"><div class="leg-dot" style="background:${d.col}"></div>${d.lbl} — ${d.desc}</div>`).join('');
  return `<div class="tbl-wrap">
    <div class="tbl-hdr"><strong>${title}</strong><span>— ${note}</span></div>
    <table>${th}${body}</table>
    <div class="leg-bar">${legs}<span style="margin-left:auto;font-size:10px;color:var(--txt3)">* Jun Wk3 = partial week</span></div>
  </div>`;
}

function show(m){
  document.getElementById('b-cpi').classList.toggle('on',m==='cpi');
  document.getElementById('b-ctr').classList.toggle('on',m==='ctr');
  document.getElementById('sum-cpi').style.display=m==='cpi'?'block':'none';
  document.getElementById('sum-ctr').style.display=m==='ctr'?'block':'none';
  document.getElementById('tbl-cpi').style.display=m==='cpi'?'':'none';
  document.getElementById('tbl-ctr').style.display=m==='ctr'?'':'none';
}

document.getElementById('sum-cpi').innerHTML=buildSummaries('cpi');
document.getElementById('sum-ctr').innerHTML=buildSummaries('ctr');
document.getElementById('tbl-cpi').innerHTML=buildTable('cpi');
document.getElementById('tbl-ctr').innerHTML=buildTable('ctr');
</script>
