*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:#f5f5f3;color:#1a1a1a;font-size:13px}
:root{--bdr:#e5e5e2;--txt2:#555;--txt3:#888;--surf:#fff;--acc:#4f46e5}
.nav{height:48px;background:#fff;border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 24px;position:sticky;top:0;z-index:100}
.nav-title{font-size:14px;font-weight:700;color:#111}
.seg{display:flex;margin-left:auto;background:#f0f0ee;border-radius:8px;padding:3px;gap:2px}
.seg-btn{padding:6px 16px;border:none;background:none;border-radius:6px;font-size:12px;font-weight:500;color:var(--txt2);cursor:pointer;font-family:inherit;transition:all .12s;white-space:nowrap}
.seg-btn.active{background:var(--acc);color:#fff;box-shadow:0 1px 4px rgba(0,0,0,.15);font-weight:600}
.script-tabs{display:flex;background:#fff;border-bottom:1px solid var(--bdr);padding:0 24px}
.stab{padding:10px 18px;border:none;background:none;font-size:12px;font-weight:500;color:var(--txt3);cursor:pointer;font-family:inherit;border-bottom:2px solid transparent;transition:all .12s}
.stab.active{color:var(--acc);border-bottom-color:var(--acc);font-weight:600}
.month-group{padding:16px 24px 4px}
.month-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--txt3);margin-bottom:12px}
.cards-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:4px}
.s-card{background:#fff;border:1px solid var(--bdr);border-radius:10px;padding:12px 14px;flex:1;min-width:0}
.s-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.s-writer{font-size:10px;font-weight:700;color:#111;letter-spacing:.3px}
.s-month-pill{font-size:8px;font-weight:600;padding:2px 7px;border-radius:20px;background:#eff6ff;color:var(--acc)}
.s-metrics{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.s-hitrate{min-width:52px}
.s-hr-val{font-size:20px;font-weight:800;line-height:1}
.s-hr-lbl{font-size:8px;font-weight:500;text-transform:uppercase;letter-spacing:.4px;color:var(--txt3);margin-top:2px}
.s-total-block{display:flex;flex-direction:column;align-items:center}
.s-total-n{font-size:16px;font-weight:700;color:#111}
.s-total-lbl{font-size:8px;color:var(--txt3);text-transform:uppercase;letter-spacing:.3px}
.s-divider{width:1px;height:30px;background:var(--bdr)}
.s-buckets{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;width:100%}
.s-bkt{display:flex;flex-direction:column;align-items:center;padding:6px 2px;border-radius:6px}
.s-bkt.clickable:hover{filter:brightness(.93);cursor:pointer}
.s-bkt-n{font-size:14px;font-weight:700;line-height:1}
.s-bkt-lbl{font-size:7px;color:var(--txt3);margin-top:2px;white-space:nowrap;text-align:center}
.c-u3{color:#065f46}.c-u35{color:#16a34a}.c-u4{color:#16a34a}.c-u5{color:#ca8a04}.c-ov5{color:#dc2626}

.detail{padding:0 24px 32px;margin-top:16px}
.detail-title{font-size:12px;font-weight:600;color:#111;margin-bottom:4px}
.detail-sub{font-size:10px;color:var(--txt3);margin-bottom:12px}
.tbl-wrap{overflow-x:auto;border:1px solid var(--bdr);border-radius:10px;background:#fff}
table{width:100%;border-collapse:collapse;min-width:800px}
thead th{background:#f7f6f3;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--txt3);padding:8px 12px;border-bottom:2px solid var(--bdr);text-align:right;white-space:nowrap;border-right:1px solid rgba(0,0,0,.05)}
thead th.thl{text-align:left}thead th.thc{text-align:center}
tbody td{padding:7px 12px;font-size:11px;text-align:right;border-bottom:1px solid #f0f0ee;border-right:1px solid rgba(0,0,0,.04)}
tbody td.tdw{text-align:left;font-weight:700;font-size:11px;color:#111;background:#fafaf8;white-space:nowrap;padding-left:14px}
tbody td.tdwk{text-align:left;color:var(--txt3);font-size:10px;padding-left:24px;background:#fefefe}
tbody td.tdn{font-weight:600;color:#111;text-align:center}
tbody tr:last-child td{border-bottom:none}
.h0{background:#4ade80}.h1{background:#86efac}.h2{background:#d1fae5}.h3{background:#fef9c3}.h4{background:#ffedd5}

.hit-col{font-weight:700;text-align:right}
.hit-pos{color:#14532d}.hit-zero{color:#9ca3af}
.empty-cell{color:#e5e7eb;text-align:center}
.cr-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center}
.cr-overlay.open{display:flex}
.cr-modal{background:#fff;border-radius:12px;width:min(920px,95vw);max-height:80vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.cr-header{padding:16px 20px 12px;border-bottom:1px solid var(--bdr);display:flex;align-items:flex-start;gap:12px}
.cr-title{font-size:14px;font-weight:700;color:#111}
.cr-sub{font-size:11px;color:var(--txt3);margin-top:2px}
.cr-close{margin-left:auto;border:none;background:#f5f5f3;border-radius:6px;padding:5px 10px;font-size:11px;font-weight:600;cursor:pointer;color:var(--txt2)}
.cr-body{overflow-y:auto;flex:1}
.cr-table{width:100%;border-collapse:collapse;font-size:11px}
.cr-table th{background:#f7f6f3;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--txt3);padding:8px 12px;border-bottom:2px solid var(--bdr);text-align:left;white-space:nowrap;position:sticky;top:0}
.cr-table td{padding:8px 12px;border-bottom:1px solid #f0f0ee;vertical-align:middle}
.cr-table tr:last-child td{border-bottom:none}
.cr-table tr:hover td{background:#fafaf8}
.cr-ac{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;color:var(--acc)}

, "ctr": 0.4644, "opening": "\u2014"}, {"ac": "JUN261259", "writer": "Zeenat", "week": "Jun Wk4", "canvas": "SciFi", "cpi": 4.86, "ctr": 0.4564, "opening": "\u2014"}, {"ac": "JUN261319", "writer": "Zeenat", "week": "Jun Wk4", "canvas": "SciFi", "cpi": 4.87, "ctr": 0.419, "opening": "\u2014"}, {"ac": "JUN261339", "writer": "Zeenat", "week": "Jun Wk4", "canvas": "SciFi", "cpi": 5.48, "ctr": 0.4034, "opening": "\u2014"}], [], [], []]}, "by_week": {"Jun Wk1": {"total": 0, "cpi_n": 0, "ctr_n": 0, "cpi_bkt": [0, 0, 0, 0, 0], "ctr_bkt": [0, 0, 0, 0, 0], "cpi_hit": 0, "ctr_hit": 0}, "Jun Wk2": {"total": 0, "cpi_n": 0, "ctr_n": 0, "cpi_bkt": [0, 0, 0, 0, 0], "ctr_bkt": [0, 0, 0, 0, 0], "cpi_hit": 0, "ctr_hit": 0}, "Jun Wk3": {"total": 0, "cpi_n": 0, "ctr_n": 0, "cpi_bkt": [0, 0, 0, 0, 0], "ctr_bkt": [0, 0, 0, 0, 0], "cpi_hit": 0, "ctr_hit": 0}, "Jun Wk4": {"total": 6, "cpi_n": 6, "ctr_n": 6, "cpi_bkt": [0, 0, 0, 3, 3], "ctr_bkt": [2, 4, 0, 0, 0], "cpi_hit": 0, "ctr_hit": 0}}}}, "weeks": ["Jun Wk1", "Jun Wk2", "Jun Wk3", "Jun Wk4"], "writer_order": ["Arzoo", "Shainee", "Zeenat"]}};
const CPI_LABELS=['<$3','$3–$3.5','$3.5–$4','$4–$5','>$5'];
const CTR_LABELS=['<0.40%','0.40–0.50%','0.50–0.55%','0.55–0.65%','0.65%+'];
const CPI_CLS=['c-u3','c-u35','c-u4','c-u5','c-ov5'];
const CTR_CLS=['ct-l40','ct-40','ct-50','ct-60','ct-65'];
const BKT_BG_CPI=['#4ade80','#86efac','#d1fae5','#fef9c3','#ffedd5'];
const BKT_BG_CTR=['#ffedd5','#fef9c3','#d1fae5','#86efac','#4ade80'];
const CPI_HEAT=['h0','h1','h2','h3','h4'];
const CTR_HEAT=['hc-l40','hc-40','hc-50','hc-60','hc-65'];
const WRITER_COLORS={Eeshita:'#4f46e5',Trishani:'#0891b2',Arzoo:'#be185d',Shainee:'#059669',Zeenat:'#d97706'};
const ROW1_V7=['Eeshita','Shainee','Zeenat'];
const ROW2_V7=['Arzoo','Trishani'];
const ROW1_LUNA=['Arzoo','Shainee','Zeenat'];
let _mode='cpi',_script='v7';

function setMode(m,btn){_mode=m;document.querySelectorAll('.seg-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');render();}
function setScript(s,btn){_script=s;document.querySelectorAll('.stab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');render();}
function hrColor(p){return p>=15?'#14532d':p>=10?'#16a34a':p>=5?'#ca8a04':p>0?'#ea580c':'#9ca3af';}

function renderCard(w,monthData,monthName,isCpi){
  const d=monthData;
  if(!d||d.total===0)return'';
  const bkts=isCpi?d.cpi_bkt:d.ctr_bkt;
  const hr=isCpi?d.cpi_hit_rate:d.ctr_hit_rate;
  const labels=isCpi?CPI_LABELS:CTR_LABELS;
  const cls=isCpi?CPI_CLS:CTR_CLS;
  const bgtbl=isCpi?BKT_BG_CPI:BKT_BG_CTR;
  const col=hrColor(hr);
  const wColor=WRITER_COLORS[w]||'#4f46e5';
  const wB64=btoa(w);
  const mLc=monthName.toLowerCase();
  const mSt=isCpi?'cpi':'ctr';
  const bktHtml=bkts.map((v,i)=>{
    const clk=v>0?'clickable':'';
    const oc=v>0?`onclick="openBktModal(this)"`:'';
    return`<div class="s-bkt ${clk}" style="background:${v>0?bgtbl[i]:'transparent'}" data-w="${wB64}" data-month="${mLc}" data-mode="${mSt}" data-sk="${_script}" data-bi="${i}" ${oc}><span class="s-bkt-n ${v>0?cls[i]:'c-miss'}">${v||0}</span><span class="s-bkt-lbl">${labels[i]}</span></div>`;
  }).join('');
  const hrOc=hr>0?`data-w="${wB64}" data-month="${mLc}" data-mode="${mSt}" data-sk="${_script}" onclick="openHitModal(this)"`:'';
  return`<div class="s-card" style="border-top:3px solid ${wColor}">
    <div class="s-card-header"><span class="s-writer">${w.toUpperCase()}</span><span class="s-month-pill">${monthName}</span></div>
    <div class="s-metrics">
      <div class="s-hitrate"><div class="s-hr-val" style="color:${col};cursor:${hr>0?'pointer':'default'}" ${hrOc}>${hr}%${hr>0?'<span style="font-size:10px;margin-left:2px">↗</span>':''}</div><div class="s-hr-lbl">Hit Rate</div></div>
      <div class="s-divider"></div>
      <div class="s-total-block"><div class="s-total-n">${d.total}</div><div class="s-total-lbl">Total</div></div>
    </div>
    <div class="s-buckets">${bktHtml}</div>
  </div>`;
}

function monthRows(sd,month,label,isCpi){
  const hasLuna=_script==='luna';
  const R1=hasLuna?ROW1_LUNA:ROW1_V7;
  const R2=hasLuna?[]:ROW2_V7;
  const r1=R1.filter(w=>sd.writers[w]).map(w=>renderCard(w,sd.writers[w][month],label,isCpi)).filter(Boolean);
  const r2=R2.filter(w=>sd.writers[w]).map(w=>renderCard(w,sd.writers[w][month],label,isCpi)).filter(Boolean);
  const all=[...r1,...r2];
  if(!all.length)return'';
  let h=`<div class="month-group"><div class="month-label">${label==='May'?'May 2026':'Jun 2026'}</div>`;
  if(all.length>=4&&r2.length){if(r1.length)h+=`<div class="cards-row">${r1.join('')}</div>`;if(r2.length)h+=`<div class="cards-row" style="margin-top:10px">${r2.join('')}</div>`;}
  else h+=`<div class="cards-row">${all.join('')}</div>`;
  return h+'</div>';
}

function render(){
  const sd=DATA[_script];const isCpi=_mode==='cpi';
  const labels=isCpi?CPI_LABELS:CTR_LABELS;const heat=isCpi?CPI_HEAT:CTR_HEAT;
  const writers=sd.writer_order;const weeks=sd.weeks;
  let sumHtml='';
  if(_script!=='luna')sumHtml+=monthRows(sd,'may','May',isCpi);
  sumHtml+=monthRows(sd,'jun','Jun',isCpi);
  document.getElementById('summary-section').innerHTML=sumHtml;
  document.getElementById('detail-title').textContent=(isCpi?'CPI':'Avg CTR×CTI')+' Distribution — Writer × Week';
  document.getElementById('detail-sub').textContent=isCpi?'Cracking hit rate':'CTR×CTI hit rate (avg of CTR*CTI & CTRxCTI)';
  document.getElementById('thead').innerHTML=`<tr><th class="thl" style="min-width:90px">Writer</th><th class="thl" style="min-width:80px">Week</th><th class="thc" style="min-width:40px">N</th>${labels.map(l=>`<th>${l}</th>`).join('')}<th class="hit-col">Hit</th></tr>`;
  function bktCells(bkts,n){
    return bkts.map((v,i)=>{
      if(!n)return'<td class="empty-cell">&ndash;</td>';
      const pct=n>0?Math.round(v/n*100):0;
      if(v===0)return`<td style="color:#e5e7eb;text-align:center">&ndash;</td>`;
      return`<td class="${heat[i]}" style="text-align:center">${v}<span style="font-size:9px;color:var(--txt3);margin-left:2px">${pct}%</span></td>`;
    }).join('');
  }
  let rows='';
  writers.forEach(w=>{
    const wd=sd.writers[w];
    let firstRow=true;
    const activeWks=weeks.filter(wk=>wd.by_week[wk]&&wd.by_week[wk].total>0);
    activeWks.forEach(wk=>{
      const wkd=wd.by_week[wk];
      const bkts=isCpi?wkd.cpi_bkt:wkd.ctr_bkt;
      const n=isCpi?wkd.cpi_n:wkd.ctr_n;
      const hit=isCpi?wkd.cpi_hit:wkd.ctr_hit;
      const hitPct=n>0?Math.round(hit/n*100):0;
      const wCell=firstRow?`<td class="tdw" rowspan="${activeWks.length}">${w}</td>`:'';
      firstRow=false;
      rows+=`<tr>${wCell}<td class="tdwk">${wk}</td><td class="tdn">${wkd.total}</td>${bktCells(bkts,n)}<td class="hit-col ${hit>0?'hit-pos':'hit-zero'}">${hit} <span style="font-size:9px">(${hitPct}%)</span></td></tr>`;
    });
  });
  document.getElementById('tbody').innerHTML=rows;
}

function showModal(title,sub,assets){
  document.getElementById('cr-title').textContent=title;
  document.getElementById('cr-sub').textContent=sub;
  const rows=assets.map(a=>{
    const cpiCls=a.cpi!==null?(a.cpi<3?'cr-cpi-great':a.cpi<3.2?'cr-cpi-good':''):'';
    const ctrCls=a.ctr!==null&&a.ctr>0.55?'cr-ctr-good':'';
    const cvCls=a.canvas==='Sabrina'?'cv-sab':'cv-sci';
    const safeOpen=(a.opening||'').replace(/"/g,'&quot;');
    return`<tr><td><span class="cr-ac">${a.ac}</span></td><td style="font-size:11px;color:var(--txt2)">${a.writer}</td><td style="font-size:10px;color:var(--txt3)">${a.week}</td><td><span class="cr-canvas ${cvCls}">${a.canvas||'SciFi'}</span></td><td style="text-align:right"><span class="${cpiCls}">${a.cpi!==null?'$'+a.cpi.toFixed(2):'—'}</span></td><td style="text-align:right"><span class="${ctrCls}">${a.ctr!==null?a.ctr.toFixed(2)+'%':'—'}</span></td><td class="cr-opening" title="${safeOpen}">${a.opening||'—'}</td></tr>`;
  }).join('');
  document.getElementById('cr-tbody').innerHTML=rows||'<tr><td colspan="7" style="padding:20px;text-align:center;color:var(--txt3)">No assets</td></tr>';
  document.getElementById('cr-overlay').classList.add('open');
}

function openBktModal(el){
  const w=atob(el.dataset.w),month=el.dataset.month,mode=el.dataset.mode,sk=el.dataset.sk,bi=parseInt(el.dataset.bi);
  const wd=DATA[sk]&&DATA[sk].writers[w];if(!wd)return;
  const mData=month==='may'?wd.may:wd.jun;
  const assets=(mode==='cpi'?mData.cpi_assets:mData.ctr_assets)[bi]||[];
  if(!assets.length)return;
  const CL=mode==='cpi'?CPI_LABELS:CTR_LABELS;
  showModal(`${w} · ${CL[bi]} · ${month==='may'?'May 2026':'Jun 2026'}`,`${assets.length} asset${assets.length>1?'s':''} in this bucket`,assets);
}

function openHitModal(el){
  const w=atob(el.dataset.w),month=el.dataset.month,mode=el.dataset.mode,sk=el.dataset.sk;
  const wd=DATA[sk]&&DATA[sk].writers[w];if(!wd)return;
  const mData=month==='may'?wd.may:wd.jun;
  const assets=mode==='cpi'?[...(mData.cpi_assets[0]||[]),...(mData.cpi_assets[1]||[])]:
    [...(mData.ctr_assets[3]||[]),...(mData.ctr_assets[4]||[])];
  if(!assets.length)return;
  showModal((mode==='cpi'?'Cracking assets':'Top CTR×CTI assets')+' · '+(month==='may'?'May 2026':'Jun 2026'),`${w} · ${assets.length} asset${assets.length>1?'s':''}`,assets);
}

function closeCrModal(){document.getElementById('cr-overlay').classList.remove('open');}
render();
</script>
