<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>WBM Writer Hit Rate — May–Jun 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f4f5f7;--surf:#fff;--surf2:#f8f9fb;--bdr:#e4e7ec;--txt:#101828;--txt2:#475467;--txt3:#98a2b3;--acc:#4f46e5}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt);font-size:13px}
.nav{background:var(--surf);border-bottom:1px solid var(--bdr);padding:0 24px;height:52px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.brand{font-size:14px;font-weight:600}.brand span{color:var(--acc)}
.toggle{margin-left:auto;display:flex;background:var(--bg);border:1px solid var(--bdr);border-radius:6px;overflow:hidden}
.t-btn{padding:5px 16px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:transparent;font-family:'Inter',sans-serif;color:var(--txt2)}
.t-btn.on{background:var(--acc);color:#fff}
.wrap{padding:20px 24px}
/* HERO */
.hero{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.hero-card{background:var(--surf);border:1px solid var(--bdr);border-radius:10px;padding:16px 18px}
.hero-name{font-size:12px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--bdr)}
.hero-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.hs .lbl{font-size:9px;color:var(--txt3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px;font-weight:500}
.hs .val{font-size:22px;font-weight:600;font-family:'JetBrains Mono',monospace;line-height:1}
.hs .sub{font-size:10px;color:var(--txt2);margin-top:3px}
.g{color:#059669}.a{color:#d97706}
/* TABLE */
.tbl-wrap{background:var(--surf);border:1px solid var(--bdr);border-radius:10px;overflow:hidden;margin-bottom:16px}
.tbl-hdr{padding:12px 16px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:10px}
.tbl-hdr strong{font-size:12px;font-weight:600}
.tbl-hdr span{font-size:11px;color:var(--txt3)}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{background:var(--surf2);font-size:9px;font-weight:500;color:var(--txt3);text-transform:uppercase;letter-spacing:.4px;padding:7px 10px;border-bottom:1px solid var(--bdr);white-space:nowrap;text-align:center}
thead th.lft{text-align:left}
tbody tr{border-bottom:1px solid var(--bdr)}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#fafafa}
tbody td{padding:7px 10px;text-align:center;white-space:nowrap;font-family:'JetBrains Mono',monospace;font-size:11px}
td.writer{text-align:left;font-family:'Inter',sans-serif;font-weight:600;font-size:12px;background:var(--surf2);border-right:1px solid var(--bdr);vertical-align:middle}
td.week{text-align:left;font-family:'Inter',sans-serif;font-size:11px;color:var(--txt2)}
td.tot{color:var(--txt2);font-weight:500}
td.hit{font-weight:600}
.n{font-size:12px;font-weight:600}
.p{font-size:10px;font-weight:400;margin-left:2px;opacity:.8}
/* CPI: red→green */
.b1{background:#ecfdf5;color:#065f46}     /* <$3       deep green */
.b2{background:#d1fae5;color:#065f46}     /* $3–3.5    mint */
.b3{background:#fffbeb;color:#78350f}     /* $3.5–4    amber */
.b4{background:#fff7ed;color:#7c2d12}     /* $4–5      orange */
.b5{background:#fef2f2;color:#7f1d1d}     /* >$5       red */
/* CTR: red→green — 0.5%+ is good */
.c0{background:#fef2f2;color:#7f1d1d}     /* <0.40%    red */
.c1{background:#fff7ed;color:#7c2d12}     /* 0.40–0.50 orange-ish neutral */
.c2{background:#ecfdf5;color:#065f46}     /* 0.50–0.60 light green — good */
.c3{background:#bbf7d0;color:#14532d}     /* 0.60–0.65 mid green */
.c4{background:#059669;color:#fff}        /* 0.65%+    deep green — hard positive */
.z{color:var(--txt3);background:transparent;font-weight:400}
.divrow td{background:var(--bg);height:5px;padding:0;border:none}
.leg-bar{display:flex;gap:14px;flex-wrap:wrap;padding:9px 14px;border-top:1px solid var(--bdr);background:var(--surf2)}
.leg-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--txt2)}
.leg-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.partial{font-size:9px;color:var(--txt3)}
</style>
</head>
<body>
<div class="nav">
  <div class="brand">WBM <span>/</span> Writer Hit Rate — May–Jun 2026</div>
  <div class="toggle">
    <button class="t-btn on" id="b-cpi" onclick="show('cpi')">CPI Buckets</button>
    <button class="t-btn" id="b-ctr" onclick="show('ctr')">CTR×CTI Buckets</button>
  </div>
</div>
<div class="wrap">
  <div class="hero" id="hero"></div>
  <div id="tbl-cpi"></div>
  <div id="tbl-ctr" style="display:none"></div>
</div>
<script>
const D={"weeks": ["May Wk1", "May Wk2", "May Wk3", "May Wk4", "Jun Wk1", "Jun Wk2", "Jun Wk3"], "writers": ["Eeshita", "Trishani", "Arzoo"], "cpi_order": ["<$3", "$3\u20133.5", "$3.5\u20134", "$4\u20135", ">$5"], "ctr_order": ["<0.40%", "0.40\u20130.50%", "0.50\u20130.60%", "0.60\u20130.65%", "0.65%+"], "data": {"Eeshita": {"May Wk1": {"total": 2, "cpi": {"<$3": 1, "$3\u20133.5": 0, "$3.5\u20134": 0, "$4\u20135": 1, ">$5": 0}, "ctr": {"<0.40%": 1, "0.40\u20130.50%": 1, "0.50\u20130.60%": 0, "0.60\u20130.65%": 0, "0.65%+": 0}}, "May Wk2": {"total": 21, "cpi": {"<$3": 0, "$3\u20133.5": 3, "$3.5\u20134": 2, "$4\u20135": 8, ">$5": 8}, "ctr": {"<0.40%": 11, "0.40\u20130.50%": 7, "0.50\u20130.60%": 3, "0.60\u20130.65%": 0, "0.65%+": 0}}, "May Wk3": {"total": 6, "cpi": {"<$3": 0, "$3\u20133.5": 0, "$3.5\u20134": 1, "$4\u20135": 0, ">$5": 5}, "ctr": {"<0.40%": 4, "0.40\u20130.50%": 1, "0.50\u20130.60%": 1, "0.60\u20130.65%": 0, "0.65%+": 0}}, "May Wk4": {"total": 6, "cpi": {"<$3": 0, "$3\u20133.5": 1, "$3.5\u20134": 1, "$4\u20135": 2, ">$5": 2}, "ctr": {"<0.40%": 1, "0.40\u20130.50%": 1, "0.50\u20130.60%": 4, "0.60\u20130.65%": 0, "0.65%+": 0}}, "Jun Wk1": {"total": 6, "cpi": {"<$3": 0, "$3\u20133.5": 0, "$3.5\u20134": 0, "$4\u20135": 2, ">$5": 4}, "ctr": {"<0.40%": 4, "0.40\u20130.50%": 1, "0.50\u20130.60%": 1, "0.60\u20130.65%": 0, "0.65%+": 0}}, "Jun Wk2": {"total": 6, "cpi": {"<$3": 0, "$3\u20133.5": 1, "$3.5\u20134": 1, "$4\u20135": 1, ">$5": 3}, "ctr": {"<0.40%": 1, "0.40\u20130.50%": 2, "0.50\u20130.60%": 1, "0.60\u20130.65%": 1, "0.65%+": 1}}, "Jun Wk3": {"total": 4, "cpi": {"<$3": 0, "$3\u20133.5": 0, "$3.5\u20134": 0, "$4\u20135": 0, ">$5": 4}, "ctr": {"<0.40%": 2, "0.40\u20130.50%": 2, "0.50\u20130.60%": 0, "0.60\u20130.65%": 0, "0.65%+": 0}}}, "Trishani": {"May Wk1": {"total": 0, "cpi": {"<$3": 0, "$3\u20133.5": 0, "$3.5\u20134": 0, "$4\u20135": 0, ">$5": 0}, "ctr": {"<0.40%": 0, "0.40\u20130.50%": 0, "0.50\u20130.60%": 0, "0.60\u20130.65%": 0, "0.65%+": 0}}, "May Wk2": {"total": 14, "cpi": {"<$3": 0, "$3\u20133.5": 1, "$3.5\u20134": 3, "$4\u20135": 1, ">$5": 9}, "ctr": {"<0.40%": 6, "0.40\u20130.50%": 6, "0.50\u20130.60%": 2, "0.60\u20130.65%": 0, "0.65%+": 0}}, "May Wk3": {"total": 8, "cpi": {"<$3": 0, "$3\u20133.5": 0, "$3.5\u20134": 0, "$4\u20135": 1, ">$5": 7}, "ctr": {"<0.40%": 7, "0.40\u20130.50%": 1, "0.50\u20130.60%": 0, "0.60\u20130.65%": 0, "0.65%+": 0}}, "May Wk4": {"total": 10, "cpi": {"<$3": 0, "$3\u20133.5": 1, "$3.5\u20134": 0, "$4\u20135": 3, ">$5": 6}, "ctr": {"<0.40%": 6, "0.40\u20130.50%": 3, "0.50\u20130.60%": 1, "0.60\u20130.65%": 0, "0.65%+": 0}}, "Jun Wk1": {"total": 6, "cpi": {"<$3": 0, "$3\u20133.5": 0, "$3.5\u20134": 0, "$4\u20135": 1, ">$5": 5}, "ctr": {"<0.40%": 4, "0.40\u20130.50%": 2, "0.50\u20130.60%": 0, "0.60\u20130.65%": 0, "0.65%+": 0}}, "Jun Wk2": {"total": 9, "cpi": {"<$3": 0, "$3\u20133.5": 0, "$3.5\u20134": 0, "$4\u20135": 1, ">$5": 8}, "ctr": {"<0.40%": 3, "0.40\u20130.50%": 5, "0.50\u20130.60%": 1, "0.60\u20130.65%": 0, "0.65%+": 0}}, "Jun Wk3": {"total": 1, "cpi": {"<$3": 0, "$3\u20133.5": 0, "$3.5\u20134": 0, "$4\u20135": 1, ">$5": 0}, "ctr": {"<0.40%": 0, "0.40\u20130.50%": 0, "0.50\u20130.60%": 1, "0.60\u20130.65%": 0, "0.65%+": 0}}}, "Arzoo": {"May Wk1": {"total": 2, "cpi": {"<$3": 0, "$3\u20133.5": 0, "$3.5\u20134": 0, "$4\u20135": 2, ">$5": 0}, "ctr": {"<0.40%": 1, "0.40\u20130.50%": 1, "0.50\u20130.60%": 0, "0.60\u20130.65%": 0, "0.65%+": 0}}, "May Wk2": {"total": 21, "cpi": {"<$3": 2, "$3\u20133.5": 3, "$3.5\u20134": 0, "$4\u20135": 5, ">$5": 11}, "ctr": {"<0.40%": 11, "0.40\u20130.50%": 7, "0.50\u20130.60%": 3, "0.60\u20130.65%": 0, "0.65%+": 0}}, "May Wk3": {"total": 9, "cpi": {"<$3": 1, "$3\u20133.5": 0, "$3.5\u20134": 1, "$4\u20135": 2, ">$5": 5}, "ctr": {"<0.40%": 5, "0.40\u20130.50%": 2, "0.50\u20130.60%": 2, "0.60\u20130.65%": 0, "0.65%+": 0}}, "May Wk4": {"total": 9, "cpi": {"<$3": 0, "$3\u20133.5": 0, "$3.5\u20134": 2, "$4\u20135": 2, ">$5": 5}, "ctr": {"<0.40%": 6, "0.40\u20130.50%": 2, "0.50\u20130.60%": 1, "0.60\u20130.65%": 0, "0.65%+": 0}}, "Jun Wk1": {"total": 12, "cpi": {"<$3": 0, "$3\u20133.5": 0, "$3.5\u20134": 2, "$4\u20135": 0, ">$5": 10}, "ctr": {"<0.40%": 8, "0.40\u20130.50%": 4, "0.50\u20130.60%": 0, "0.60\u20130.65%": 0, "0.65%+": 0}}, "Jun Wk2": {"total": 10, "cpi": {"<$3": 0, "$3\u20133.5": 0, "$3.5\u20134": 1, "$4\u20135": 2, ">$5": 7}, "ctr": {"<0.40%": 2, "0.40\u20130.50%": 5, "0.50\u20130.60%": 3, "0.60\u20130.65%": 0, "0.65%+": 0}}, "Jun Wk3": {"total": 2, "cpi": {"<$3": 0, "$3\u20133.5": 1, "$3.5\u20134": 0, "$4\u20135": 1, ">$5": 0}, "ctr": {"<0.40%": 0, "0.40\u20130.50%": 0, "0.50\u20130.60%": 1, "0.60\u20130.65%": 1, "0.65%+": 0}}}}};
const CPI_DEFS=[
  {key:'<$3',    cls:'b1',col:'#059669',lbl:'<$3',      desc:'Cracked'},
  {key:'$3–3.5', cls:'b2',col:'#34d399',lbl:'$3–$3.5',  desc:'Near crack'},
  {key:'$3.5–4', cls:'b3',col:'#fbbf24',lbl:'$3.5–$4',  desc:'Good'},
  {key:'$4–5',   cls:'b4',col:'#f97316',lbl:'$4–$5',    desc:'Moderate'},
  {key:'>$5',    cls:'b5',col:'#ef4444',lbl:'>$5',      desc:'Miss'},
];
const CTR_DEFS=[
  {key:'<0.40%',    cls:'c0',col:'#ef4444',lbl:'<0.40%',    desc:'Low'},
  {key:'0.40–0.50%',cls:'c1',col:'#fdba74',lbl:'0.40–0.50%',desc:'Below avg'},
  {key:'0.50–0.60%',cls:'c2',col:'#86efac',lbl:'0.50–0.60%',desc:'Good ✓'},
  {key:'0.60–0.65%',cls:'c3',col:'#4ade80',lbl:'0.60–0.65%',desc:'Strong'},
  {key:'0.65%+',    cls:'c4',col:'#059669',lbl:'0.65%+',    desc:'Hard positive ✓✓'},
];

function cell(n,total,cls){
  if(!total||n===0) return `<td class="z">—</td>`;
  const p=Math.round(n/total*100);
  return `<td class="${cls}"><span class="n">${n}</span><span class="p">${p}%</span></td>`;
}

function buildHero(){
  return D.writers.map(w=>{
    const wd=D.data[w];
    const total=D.weeks.reduce((s,wk)=>s+(wd[wk]?.total||0),0);
    const gCpi=D.weeks.reduce((s,wk)=>{const d=wd[wk];return s+(d?.cpi['<$3']||0)+(d?.cpi['$3–3.5']||0);},0);
    const gCtr=D.weeks.reduce((s,wk)=>{const d=wd[wk];return s+(d?.ctr['0.50–0.60%']||0)+(d?.ctr['0.60–0.65%']||0)+(d?.ctr['0.65%+']||0);},0);
    let bestWk='—',bestN=0;
    D.weeks.forEach(wk=>{const d=wd[wk];if(!d)return;const n=(d.cpi['<$3']||0)+(d.cpi['$3–3.5']||0);if(n>bestN){bestN=n;bestWk=wk;}});
    return `<div class="hero-card">
      <div class="hero-name">${w}</div>
      <div class="hero-stats">
        <div class="hs"><div class="lbl">CPI ≤$3.5 cracked</div><div class="val g">${gCpi}</div><div class="sub">${total?Math.round(gCpi/total*100):0}% of ${total} assets</div></div>
        <div class="hs"><div class="lbl">CTR×CTI ≥0.50%</div><div class="val g">${gCtr}</div><div class="sub">${total?Math.round(gCtr/total*100):0}% of ${total} assets</div></div>
        <div class="hs"><div class="lbl">Total assets tested</div><div class="val a">${total}</div><div class="sub">May Wk1 – Jun Wk3</div></div>
        <div class="hs"><div class="lbl">Best CPI week</div><div class="val a">${bestWk}</div><div class="sub">${bestN} assets ≤$3.5</div></div>
      </div>
    </div>`;
  }).join('');
}

function buildTable(mode){
  const defs=mode==='cpi'?CPI_DEFS:CTR_DEFS;
  const mk=mode==='cpi'?'cpi':'ctr';
  const goodKeys=mode==='cpi'?['<$3','$3–3.5']:['0.50–0.60%','0.60–0.65%','0.65%+'];
  const title=mode==='cpi'?'CPI Distribution — Writer × Week':'CTR×CTI Distribution — Writer × Week';
  const note=mode==='cpi'?'Hit = assets ≤$3.5':'Hit = assets ≥0.50% (good threshold)';

  let th=`<thead><tr><th class="lft" style="width:80px">Writer</th><th class="lft" style="width:68px">Week</th><th style="width:40px">n</th>`;
  defs.forEach(d=>{th+=`<th style="min-width:82px">${d.lbl}</th>`;});
  th+=`<th style="min-width:72px">Hit</th></tr></thead>`;

  let body='<tbody>';
  D.writers.forEach((w,wi)=>{
    if(wi>0) body+=`<tr class="divrow"><td colspan="99"></td></tr>`;
    D.weeks.forEach((wk,wki)=>{
      const d=D.data[w][wk], total=d?.total||0;
      const partial=wk==='Jun Wk3';
      const good=d?goodKeys.reduce((s,k)=>s+(d[mk][k]||0),0):0;
      const hp=total?Math.round(good/total*100):0;
      const hcol=hp>=30?'#059669':hp>=15?'#d97706':'#dc2626';
      body+=`<tr>`;
      if(wki===0) body+=`<td class="writer" rowspan="${D.weeks.length}">${w}</td>`;
      body+=`<td class="week">${wk}${partial?' <span class="partial">*</span>':''}</td>`;
      body+=`<td class="tot">${total||'—'}</td>`;
      if(!total){
        defs.forEach(()=>{body+=`<td class="z">—</td>`;});
        body+=`<td class="z">—</td>`;
      } else {
        defs.forEach(def=>{body+=cell(d[mk][def.key]||0,total,def.cls);});
        body+=`<td class="hit" style="color:${hcol}">${good} <span style="font-size:10px;font-weight:400">(${hp}%)</span></td>`;
      }
      body+=`</tr>`;
    });
  });
  body+='</tbody>';

  const legs=defs.map(d=>`<div class="leg-item"><div class="leg-dot" style="background:${d.col}"></div>${d.lbl} — ${d.desc}</div>`).join('');
  return `<div class="tbl-wrap">
    <div class="tbl-hdr"><strong>${title}</strong><span>— ${note}</span></div>
    <table>${th}${body}</table>
    <div class="leg-bar">${legs}<span style="margin-left:auto;font-size:10px;color:var(--txt3)">* Jun Wk3 = partial week</span></div>
  </div>`;
}

function show(m){
  document.getElementById('b-cpi').classList.toggle('on',m==='cpi');
  document.getElementById('b-ctr').classList.toggle('on',m==='ctr');
  document.getElementById('tbl-cpi').style.display=m==='cpi'?'':'none';
  document.getElementById('tbl-ctr').style.display=m==='ctr'?'':'none';
}

document.getElementById('hero').innerHTML=buildHero();
document.getElementById('tbl-cpi').innerHTML=buildTable('cpi');
document.getElementById('tbl-ctr').innerHTML=buildTable('ctr');
</script>
</body>
</html>
